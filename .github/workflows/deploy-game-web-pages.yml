name: Deploy Cache Keepers to GitHub Pages

on:
  push:
    branches: ["main"]
    paths:
      - "computer-architecture/cache-simlulator/game-web/**"
      - ".github/workflows/deploy-game-web-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: computer-architecture/cache-simlulator/game-web

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
